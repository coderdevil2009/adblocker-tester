<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Adblock Stress Test</title>
<div style="margin-top:20px;">
<label>Ads per second:</label>
<input type="number" id="rateInput" value="1000" min="1" max="20000">
<button onclick="setRate()">Set</button>
</div>
<style>
body{
    font-family: Arial, sans-serif;
    background:#0f172a;
    color:white;
    text-align:center;
}

.panel{
    margin-top:40px;
    font-size:22px;
}

.counter{
    font-size:40px;
    margin:10px;
    color:#22c55e;
}
</style>

</head>

<body>

<h1>Adblock Stress Test</h1>
<p>This page continuously generates ad/tracker-style requests.</p>

<div class="panel">
<div>Requests Generated</div>
<div class="counter" id="reqCount">0</div>

<div>Requests / second</div>
<div class="counter" id="rps">0</div>

<div>Runtime (seconds)</div>
<div class="counter" id="runtime">0</div>
</div>

<script>

let totalRequests = 0
let requestsThisSecond = 0
let seconds = 0

let targetRate = 1000
let burstInterval = null
const intervalMs = 100

const patterns = [
"/ads/banner",
"/ads/script",
"/tracker/pixel",
"/analytics/collect",
"/ads/impression"
]

function generateRequest(){

    const pattern = patterns[Math.floor(Math.random()*patterns.length)]

    const img = new Image()

    img.src =
    window.location.origin +
    pattern +
    "?id=" + Math.random()

    totalRequests++
    requestsThisSecond++
}

function startGenerator(){

    if(burstInterval){
        clearInterval(burstInterval)
    }

    const burstsPerSecond = 1000 / intervalMs
    const requestsPerBurst = Math.floor(targetRate / burstsPerSecond)

    burstInterval = setInterval(()=>{

        for(let i=0;i<requestsPerBurst;i++){
            generateRequest()
        }

    }, intervalMs)

}

function setRate(){

    const input = document.getElementById("rateInput").value

    targetRate = parseInt(input)

    startGenerator()

}

startGenerator()

setInterval(()=>{

    seconds++

    document.getElementById("reqCount").textContent = totalRequests
    document.getElementById("rps").textContent = requestsThisSecond
    document.getElementById("runtime").textContent = seconds

    requestsThisSecond = 0

},1000)

</script>

</body>
</html>
