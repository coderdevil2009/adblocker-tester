<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XAnimeX</title>
    <style>
        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: #00ff00;
            width: 100%;
            min-height: 100vh;
        }
        body { padding: 12px; }
        .container { max-width: 600px; margin: 0 auto; width: 100%; }
        h1 { text-align: center; color: #fff; text-shadow: 0 0 10px #00ff00; font-size: 22px; margin: 8px 0; }
        .sub { text-align: center; color: #666; font-size: 13px; margin: 0 0 14px 0; }
        
        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 10px;
            padding: 14px;
            margin-bottom: 10px;
        }
        .card label {
            display: block;
            font-size: 12px;
            color: #888;
            margin-bottom: 6px;
        }
        
        input, select {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            color: #00ff00;
            outline: none;
        }
        input:focus, select:focus {
            border-color: #00ff00;
        }
        
        /* CRITICAL: touch-action forces immediate touch response */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 15px 12px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
            min-height: 48px;
        }
        
        .btn-primary {
            background: #00ff00;
            color: #000;
        }
        .btn-secondary {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
        }
        .btn-secondary.active {
            background: #00ff00;
            color: #000;
            border-color: #00ff00;
        }
        .btn-danger {
            background: #330000;
            color: #ff4444;
            border: 1px solid #550000;
        }
        .btn-sm {
            padding: 10px;
            font-size: 13px;
            min-height: 40px;
            width: auto;
            flex: 1;
        }
        
        .row {
            display: flex;
            gap: 8px;
        }
        .row > * { flex: 1; }
        
        .search-wrap {
            display: flex;
            gap: 8px;
        }
        .search-wrap input { flex: 1; }
        .search-wrap .btn {
            width: auto;
            padding: 14px 18px;
            flex: 0 0 auto;
        }
        
        #status {
            padding: 12px;
            margin: 8px 0;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .s-success { display: block !important; background: #004400; color: #00ff00; }
        .s-error { display: block !important; background: #440000; color: #ff4444; }
        .s-info { display: block !important; background: #003344; color: #00ccff; }
        
        #searchResult {
            display: none;
            background: #0d1a0d;
            border: 1px solid #004400;
            border-radius: 8px;
            padding: 12px;
            margin-top: 8px;
        }
        #searchResult.show { display: block; }
        #searchResult .title { color: #fff; font-size: 15px; font-weight: bold; }
        #searchResult .meta { color: #888; font-size: 12px; margin-top: 4px; }
        #searchResult .meta span { color: #00ff00; }
        
        #playerWrap {
            display: none;
            margin-top: 10px;
            border-radius: 10px;
            overflow: hidden;
            background: #000;
            border: 1px solid #333;
        }
        #player {
            width: 100%;
            height: 240px;
            border: none;
            background: #000;
            display: block;
        }
        @media (min-width: 600px) { #player { height: 400px; } }
        
        .p-controls {
            display: flex;
            gap: 6px;
            padding: 8px;
            background: #111;
            border-top: 1px solid #222;
        }
        .p-info {
            text-align: center;
            font-size: 11px;
            color: #555;
            padding: 6px;
            background: #0d0d0d;
        }
        .p-info span { color: #00ff00; }
        
        .id-row {
            display: flex;
            gap: 8px;
        }
        .id-row select { flex: 0 0 80px; }
        .id-row input { flex: 1; }
        
        .mt-8 { margin-top: 8px; }
        .footer {
            text-align: center;
            color: #333;
            font-size: 11px;
            margin-top: 20px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍥 XAnimeX</h1>
        <p class="sub">TMDB → Embed → Stream</p>

        <!-- Step 1: Search -->
        <div class="card">
            <label>1. Search Anime (TMDB)</label>
            <div class="search-wrap">
                <input type="text" id="animeName" placeholder="e.g. One Piece, AOT" value="One Piece">
                <button class="btn btn-secondary" id="btnSearch" style="font-size:18px;">🔍</button>
            </div>
            <div id="searchResult">
                <div class="title" id="resultTitle"></div>
                <div class="meta" id="resultMeta"></div>
                <button class="btn btn-primary" id="btnApplyResult">✅ Use This</button>
            </div>
            <div id="searchStatus" style="margin-top:6px;font-size:12px;color:#666;"></div>
        </div>

        <!-- Step 2: ID -->
        <div class="card">
            <label>2. ID</label>
            <div class="id-row">
                <select id="idType">
                    <option value="tmdb">TMDB</option>
                    <option value="imdb">IMDB</option>
                </select>
                <input type="text" id="showId" placeholder="e.g. 1399 or tt0944947">
            </div>
        </div>

        <!-- Step 3: Season + Episode -->
        <div class="card">
            <label>3. Season &amp; Episode</label>
            <div class="row">
                <div>
                    <label style="font-size:11px;color:#666;margin-bottom:4px;display:block;">Season</label>
                    <input type="number" id="season" min="1" value="1">
                </div>
                <div>
                    <label style="font-size:11px;color:#666;margin-bottom:4px;display:block;">Episode</label>
                    <input type="number" id="episode" min="1" value="1">
                </div>
            </div>
        </div>

        <!-- Step 4: Version -->
        <div class="card">
            <label>4. Audio</label>
            <div class="row" id="versionGroup">
                <button class="btn btn-primary active" id="btnSub">SUB</button>
                <button class="btn btn-secondary" id="btnDub">DUB</button>
            </div>
        </div>

        <!-- Generate -->
        <button class="btn btn-primary" id="btnGenerate">🔥 Generate &amp; Play</button>

        <!-- Status -->
        <div id="status"></div>

        <!-- Player -->
        <div id="playerWrap">
            <iframe id="player" allow="accelerometer; autoplay; encrypted-media; gyroscope; picture-in-picture" allowfullscreen referrerpolicy="origin"></iframe>
            <div class="p-info">Mirror: <span id="mirrorLabel">1/4</span> · <span id="mirrorName">vidsrc-embed.su</span></div>
            <div class="p-controls">
                <button class="btn btn-secondary btn-sm" id="btnReload">🔄 Reload</button>
                <button class="btn btn-secondary btn-sm" id="btnSwitch">🔀 Switch</button>
                <button class="btn btn-danger btn-sm" id="btnClose">✕ Close</button>
            </div>
        </div>

        <div class="footer">XAnimeX v2.1 • Mobile</div>
    </div>

    <script>
        (function() {
            'use strict';

            // === CONFIG ===
            var TMDB_KEY = '3fd2be6f0c70a2a598f084ddfb75487c';
            var MIRRORS = [
                { name: 'vidsrc-embed.su', url: 'https://vidsrc-embed.su/embed/tv' },
                { name: 'vidsrc-embed.ru',       url: 'https://vidsrc-embed.ru/embed/tv' },
                { name: 'vidsrcme.ru',     url: 'https://vidsrcme.ru/embed/tv' },
                { name: 'vidsrc.fm',       url: 'https://vidsrc.fm/embed/tv' },
                { name: 'vidsrc.icu',      url: 'https://vidsrc.icu/embed/tv' }
            ];

            var currentMirror = 0;
            var currentVersion = 'sub';
            var lastSearchData = null;

            // === DOM ===
            var $ = function(id) { return document.getElementById(id); };
            var animeName      = $('animeName');
            var btnSearch      = $('btnSearch');
            var searchResult   = $('searchResult');
            var resultTitle    = $('resultTitle');
            var resultMeta     = $('resultMeta');
            var btnApplyResult = $('btnApplyResult');
            var searchStatus   = $('searchStatus');
            var idType         = $('idType');
            var showId         = $('showId');
            var season         = $('season');
            var episode        = $('episode');
            var btnSub         = $('btnSub');
            var btnDub         = $('btnDub');
            var btnGenerate    = $('btnGenerate');
            var status         = $('status');
            var playerWrap     = $('playerWrap');
            var player         = $('player');
            var mirrorLabel    = $('mirrorLabel');
            var mirrorName     = $('mirrorName');
            var btnReload      = $('btnReload');
            var btnSwitch      = $('btnSwitch');
            var btnClose       = $('btnClose');

            // === THE FIX: bind both touchstart AND click ===
            function tap(el, fn) {
                if (!el) return;
                // touchstart fires IMMEDIATELY on Android, no 300ms delay
                el.addEventListener('touchstart', function(e) {
                    e.preventDefault(); // prevents ghost click issues
                    fn(e);
                }, { passive: false });
                // click as fallback for desktop / non-touch
                el.addEventListener('click', function(e) {
                    fn(e);
                });
            }

            // === Status ===
            function showStatus(msg, type) {
                status.textContent = msg;
                status.className = 's-' + type;
                status.style.display = 'block';
            }
            function hideStatus() {
                status.style.display = 'none';
            }

            // === Search ===
            function searchAnime() {
                var name = animeName.value.trim();
                if (!name) { showStatus('Enter a name', 'error'); return; }
                showStatus('Searching...', 'info');
                searchResult.classList.remove('show');
                searchStatus.textContent = 'Searching...';

                var url = 'https://api.themoviedb.org/3/search/tv?api_key=' + TMDB_KEY + '&query=' + encodeURIComponent(name) + '&language=en-US&page=1';
                fetch(url)
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.results && data.results.length > 0) {
                            var show = data.results[0];
                            lastSearchData = show;
                            resultTitle.textContent = show.name || 'Unknown';
                            var year = show.first_air_date ? show.first_air_date.substring(0, 4) : 'N/A';
                            resultMeta.innerHTML = 'TMDB: <span>' + show.id + '</span> | Year: <span>' + year + '</span>';
                            searchResult.classList.add('show');
                            showStatus('Found: ' + show.name, 'success');
                            searchStatus.textContent = '';
                        } else {
                            showStatus('No results', 'error');
                            searchStatus.textContent = 'No matches';
                        }
                    })
                    .catch(function() {
                        showStatus('TMDB search failed. Use manual ID.', 'error');
                        searchStatus.textContent = 'Search error';
                    });
            }

            // === Generate ===
            function generateEmbed() {
                var tid = idType.value;
                var sid = showId.value.trim();
                var s = parseInt(season.value) || 1;
                var e = parseInt(episode.value) || 1;
                var ver = currentVersion;

                if (!sid) { showStatus('Enter an ID', 'error'); return; }
                if (sid.match(/^tt\d+/i)) { idType.value = 'imdb'; tid = 'imdb'; }

                showStatus('Loading S' + s + 'E' + e + ' ' + ver.toUpperCase(), 'info');
                loadMirror(tid, sid, s, e, ver, 0);
            }

            function loadMirror(tid, sid, s, e, ver, idx) {
                if (idx >= MIRRORS.length) {
                    showStatus('All mirrors failed', 'error');
                    return;
                }
                currentMirror = idx;
                var mirror = MIRRORS[idx];
                var params = new URLSearchParams();
                params.set(tid, sid);
                params.set('season', s);
                params.set('episode', e);
                params.set('ds_lang', ver === 'dub' ? 'en' : 'ja');
                var url = mirror.url + '?' + params.toString();
                player.src = url;
                playerWrap.style.display = 'block';
                mirrorLabel.textContent = (idx + 1) + '/' + MIRRORS.length;
                mirrorName.textContent = mirror.name;
                showStatus('▶ ' + mirror.name, 'success');
            }

            // === BIND ALL BUTTONS (touchstart + click) ===

            // Search
            tap(btnSearch, function() { searchAnime(); });

            // Apply search result
            tap(btnApplyResult, function() {
                if (!lastSearchData) return;
                showId.value = lastSearchData.id;
                idType.value = 'tmdb';
                searchResult.classList.remove('show');
                showStatus('Applied TMDB: ' + lastSearchData.id, 'success');
                lastSearchData = null;
            });

            // Version: SUB
            tap(btnSub, function() {
                currentVersion = 'sub';
                btnSub.className = 'btn btn-primary active';
                btnDub.className = 'btn btn-secondary';
            });

            // Version: DUB
            tap(btnDub, function() {
                currentVersion = 'dub';
                btnDub.className = 'btn btn-primary active';
                btnSub.className = 'btn btn-secondary';
            });

            // Generate
            tap(btnGenerate, function() { generateEmbed(); });

            // Reload
            tap(btnReload, function() {
                var src = player.src;
                if (!src) return;
                player.src = '';
                setTimeout(function() { player.src = src; }, 300);
                showStatus('Reloaded', 'info');
            });

            // Switch mirror
            tap(btnSwitch, function() {
                var tid = idType.value;
                var sid = showId.value.trim();
                var s = season.value;
                var e = episode.value;
                var ver = currentVersion;
                var next = (currentMirror + 1) % MIRRORS.length;
                loadMirror(tid, sid, s, e, ver, next);
            });

            // Close player
            tap(btnClose, function() {
                player.src = '';
                playerWrap.style.display = 'none';
                showStatus('Closed', 'info');
                setTimeout(hideStatus, 1500);
            });

            // Enter key
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    var active = document.activeElement;
                    if (active === animeName) { e.preventDefault(); searchAnime(); }
                    else if (active === showId || active === season || active === episode) { e.preventDefault(); generateEmbed(); }
                }
            });

            // Auto-search
            setTimeout(searchAnime, 500);

        })();
    </script>
</body>
</html>
